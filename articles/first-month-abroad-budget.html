<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>出国第一个月要准备多少钱？</title><meta name="description" content="留学生出国第一个月预算清单，包括押金、临时住宿、交通卡、电话卡、家具和生活用品。"><link rel="stylesheet" href="../styles.css"></head><body><header class="site-header"><a class="brand" href="../index.html"><span class="brand-mark">S</span><span>StudyCost</span></a><nav class="nav"><a href="../index.html#calculator">计算器</a><a href="index.html">文章</a></nav></header><main class="article-shell"><article class="article-body"><p class="eyebrow">First Month</p><h1>出国第一个月要准备多少钱？</h1><p>第一个月不是普通月。你可能要同时支付押金、首月房租、临时住宿、交通卡、电话卡、厨具、床品和保险。</p><h2>建议</h2><p>在计算器月度预算之外，额外准备 1.5-2.5 个月生活费作为启动资金。越晚确定住宿，缓冲越要充足。</p></article></main></body></html>
