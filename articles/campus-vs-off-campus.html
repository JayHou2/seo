<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>校内宿舍 vs 校外租房</title><meta name="description" content="比较校内宿舍和校外租房的费用、通勤、押金、家具、社交和安全差异。"><link rel="stylesheet" href="../styles.css"></head><body><header class="site-header"><a class="brand" href="../index.html"><span class="brand-mark">S</span><span>StudyCost</span></a><nav class="nav"><a href="../index.html#calculator">计算器</a><a href="index.html">文章</a></nav></header><main class="article-shell"><article class="article-body"><p class="eyebrow">Housing</p><h1>校内宿舍 vs 校外租房</h1><p>校内宿舍不一定便宜，但确定性强；校外租房选择更多，但需要自己承担押金、家具、水电网和合同风险。</p><h2>判断方法</h2><p>把月租、通勤、家具、押金摊销、做饭条件和安全感放在同一张表里比较，而不是只看标价。</p></article></main></body></html>
