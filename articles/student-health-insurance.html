<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>留学生医保怎么估预算？</title><meta name="description" content="留学生医保预算指南，解释学校保险、国家医保项目、免赔额和常见额外支出。"><link rel="stylesheet" href="../styles.css"></head><body><header class="site-header"><a class="brand" href="../index.html"><span class="brand-mark">S</span><span>StudyCost</span></a><nav class="nav"><a href="../index.html#calculator">计算器</a><a href="index.html">文章</a></nav></header><main class="article-shell"><article class="article-body"><p class="eyebrow">Insurance</p><h1>留学生医保怎么估预算？</h1><p>医保不只是月费。估预算时要看学校是否强制购买、能否 waive、免赔额、共付额、牙科眼科是否包含。</p><h2>检查清单</h2><ul><li>学校账单里是否已经包含保险。</li><li>看病前是否需要校医院转诊。</li><li>处方药、急诊和心理咨询如何报销。</li></ul><section class="seo-block"><h2>FAQ 与内部链接</h2><h3>医保可以完全不买吗？</h3><p>多数学校或签证路径会要求合规保险。能否豁免取决于学校和国家要求。</p><h3>下一篇应该看什么？</h3><p>继续看 <a href="first-month-abroad-budget.html">出国第一个月预算</a> 和 <a href="../resources.html">数据来源与更新方法</a>。</p></section></article></main></body></html>
